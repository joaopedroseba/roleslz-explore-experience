<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Role Explore Experience</title>
<style>
  :root {
    --red: #C0392B; --red-light: #fdf0ef; --red-mid: #e8534a;
    --teal: #0e8c8c; --teal-light: #e6f7f7; --teal-mid: #1ab3b3;
    --gold: #c9902a; --sand: #f5f0e8; --dark: #1a1a1a; --gray: #f4f4f4;
    --grad: linear-gradient(135deg, #C0392B 0%, #8b3a8b 45%, #0e8c8c 100%);
    --grad-soft: linear-gradient(135deg, #fdf0ef 0%, #f5eef8 50%, #e6f7f7 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(160deg,#1a0a0a 0%,#0e2a2a 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:18px 8px 30px;}
  #topbar{width:100%;max-width:820px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  #proj-name{font-weight:900;font-size:15px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  #slide-counter{font-size:12px;color:#aaa;}
  #card{width:100%;max-width:820px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.4);overflow:hidden;}
  #slide-header{background:var(--grad);padding:18px 24px 16px;}
  #slide-tag{background:rgba(255,255,255,.2);color:#fff;border-radius:4px;padding:2px 10px;font-size:10px;font-weight:800;letter-spacing:1px;display:inline-block;margin-bottom:6px;}
  #slide-title{color:#fff;font-weight:900;font-size:20px;}
  #slide-body{padding:20px 24px;min-height:360px;background:#fafafa;}
  #nav{display:flex;gap:12px;margin-top:18px;align-items:center;}
  .nav-btn{border:none;border-radius:8px;padding:10px 24px;font-weight:700;font-size:14px;cursor:pointer;color:#fff;transition:.2s;}
  .nav-btn:disabled{background:#444!important;opacity:.5;cursor:not-allowed;}
  #prev-btn{background:var(--red);}
  #next-btn{background:var(--teal);}
  #dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:340px;}
  .dot{height:8px;border-radius:4px;background:rgba(255,255,255,.3);cursor:pointer;transition:all .25s;}
  #index{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap;justify-content:center;max-width:820px;}
  .idx-btn{background:rgba(255,255,255,.08);color:#bbb;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;}
  .idx-btn.active{color:#fff;font-weight:700;}

  /* --- Componentes reutilizáveis --- */
  .section-label{display:inline-block;border-radius:4px;padding:2px 12px;font-size:11px;font-weight:800;margin-bottom:12px;letter-spacing:.5px;color:#fff;background:var(--gold);}
  .section-label.red{background:var(--red);}
  .section-label.teal{background:var(--teal);}

  .pill{display:inline-block;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin:3px 4px;border:1.5px solid;}

  table{width:100%;border-collapse:collapse;margin-top:12px;}
  th{background:var(--grad);color:#fff;padding:7px 10px;text-align:left;font-size:12px;}
  td{padding:6px 10px;border-bottom:1px solid #e0d8cc;color:var(--dark);font-size:12px;}
  tr:nth-child(even) td{background:var(--sand);}
  tr:nth-child(odd) td{background:#fff;}

  .row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .role-card{flex:1;min-width:200px;background:#fff;border:2px solid var(--red);border-radius:12px;padding:16px;box-shadow:0 2px 12px rgba(192,57,43,.12);}
  .explore-card{flex:1;min-width:200px;background:#fff;border:2px solid var(--teal);border-radius:12px;padding:16px;box-shadow:0 2px 12px rgba(14,140,140,.12);}
  .card-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-right:8px;}
  .card-head{display:flex;align-items:center;margin-bottom:10px;}
  .card-head span{font-weight:800;font-size:14px;}
  .role-card .card-icon{background:var(--red);}
  .role-card .card-head span{color:var(--red);}
  .explore-card .card-icon{background:var(--teal);}
  .explore-card .card-head span{color:var(--teal);}
  ul.bullets{padding-left:16px;margin:6px 0;}
  ul.bullets li{font-size:12px;margin-bottom:5px;color:var(--dark);}

  .info-box{border-radius:8px;padding:12px;margin-top:10px;}
  .info-box.teal{background:var(--teal-light);border:1px solid rgba(14,140,140,.3);}
  .info-box.red{background:var(--red-light);border:1px solid rgba(192,57,43,.3);}
  .info-box.sand{background:var(--sand);border:1px solid #ddd;}
  .info-box.grad{background:var(--grad-soft);border:1.5px solid #ccc;}

  .tag-badge{background:var(--red);color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;margin-right:4px;display:inline-block;}
  .tag-badge.teal{background:var(--teal);}

  .step-item{display:flex;align-items:flex-start;gap:10px;background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:8px;}
  .step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}

  .layer-box{border-radius:8px;padding:12px;margin-bottom:10px;}
  .layer-box .tags-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .layer-box .tag-item{font-size:12px;color:var(--dark);background:#fff;border-radius:4px;padding:3px 8px;}

  .mono{font-family:monospace;font-size:12px;color:var(--dark);white-space:pre-wrap;background:var(--sand);border-radius:4px;padding:10px;}

  .funnel-step{flex:1;min-width:130px;background:#fff;border-radius:10px;padding:14px;text-align:center;}
  .arrow-sep{display:flex;align-items:center;font-size:20px;color:#aaa;}

  /* Capa */
  .capa-logo{display:inline-block;background:var(--grad);border-radius:14px;padding:10px 32px;margin-bottom:16px;}
  .capa-logo span{color:#fff;font-weight:900;font-size:22px;letter-spacing:1px;}
  .capa-brands{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .capa-brand{border-radius:10px;padding:10px 20px;}
  .capa-brand.role{background:var(--red-light);border:2px solid var(--red);}
  .capa-brand.explore{background:var(--teal-light);border:2px solid var(--teal);}
  .capa-brand .brand-name{font-weight:800;font-size:15px;}
  .capa-brand .brand-sub{font-size:12px;color:var(--dark);margin-top:3px;}
  .capa-brand.role .brand-name{color:var(--red);}
  .capa-brand.explore .brand-name{color:var(--teal);}
  .pills-wrap{display:flex;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}

  .two-col-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:540px){.two-col-grid{grid-template-columns:1fr;}.row{flex-direction:column;}}
</style>
</head>
<body>

<div id="topbar">
  <div id="proj-name">🌿 Role Explore Experience</div>
  <div id="slide-counter"></div>
</div>

<div id="card">
  <div id="slide-header">
    <div id="slide-tag"></div>
    <div id="slide-title"></div>
  </div>
  <div id="slide-body"></div>
</div>

<div id="nav">
  <button class="nav-btn" id="prev-btn" onclick="go(-1)">← Anterior</button>
  <div id="dots"></div>
  <button class="nav-btn" id="next-btn" onclick="go(1)">Próximo →</button>
</div>

<div id="index"></div>

<script>
const RED='#C0392B',TEAL='#0e8c8c',GOLD='#c9902a';

const slides=[
  // 1 CAPA
  {tag:'APRESENTAÇÃO EXECUTIVA',title:'Role Explore Experience',html:`
    <div style="text-align:center;padding:4px 0 10px">

      <!-- Tagline -->
      <div style="font-size:12px;letter-spacing:3px;color:#999;font-weight:600;margin-bottom:18px;text-transform:uppercase">Parceria Estratégica · Maranhão</div>

      <!-- Brands -->
      <div class="capa-brands" style="margin-bottom:20px">
        <div class="capa-brand role" style="padding:16px 28px">
          <div style="font-size:28px;margin-bottom:6px">📱</div>
          <div class="brand-name" style="font-size:17px">Role SLZ</div>
          <div class="brand-sub" style="margin-top:4px;font-size:12px">+300k seguidores</div>
          <div style="font-size:11px;color:#888;margin-top:4px">Conteúdo · Tráfego · Concierge</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
          <div style="font-size:28px">×</div>
          <div style="font-size:10px;color:#bbb;font-weight:700;letter-spacing:2px">COLLAB</div>
        </div>
        <div class="capa-brand explore" style="padding:16px 28px">
          <div style="font-size:28px;margin-bottom:6px">🏜️</div>
          <div class="brand-name" style="font-size:17px">Explore Atins</div>
          <div class="brand-sub" style="margin-top:4px;font-size:12px">Operadora Lençóis</div>
          <div style="font-size:11px;color:#888;margin-top:4px">Passeios · Pacotes · Bate-voltas</div>
        </div>
      </div>

      <!-- Destinos -->
      <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:20px">
        ${['🏙️ São Luís','🎣 Raposa','🏜️ Barreirinhas','🌊 Atins','🌅 Santo Amaro'].map(d=>`
          <div style="background:#fff;border:1.5px solid #ddd;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:#444">${d}</div>
        `).join('')}
      </div>

      <!-- Pills -->
      <div class="pills-wrap" style="margin-bottom:20px">
        <span class="pill" style="border-color:${RED};color:${RED}">Conteúdo Collab</span>
        <span class="pill" style="border-color:${RED};color:${RED}">Comissão por Passeio</span>
        <span class="pill" style="border-color:${TEAL};color:${TEAL}">Concierge + Cupom</span>
        <span class="pill" style="border-color:${GOLD};color:${GOLD}">São João + Lençóis</span>
        <span class="pill" style="border-color:${TEAL};color:${TEAL}">Bate-Volta</span>
        <span class="pill" style="border-color:${GOLD};color:${GOLD}">Pacotes 3D / 4D</span>
      </div>

      <!-- Proposta de valor -->
      <div style="background:linear-gradient(135deg,rgba(192,57,43,.07) 0%,rgba(201,144,42,.05) 50%,rgba(14,140,140,.07) 100%);border:1.5px solid #ddd;border-radius:14px;padding:18px 24px;display:inline-block;text-align:left;max-width:520px">
        <div style="font-size:10px;font-weight:800;letter-spacing:2px;color:#999;margin-bottom:8px;text-transform:uppercase">Proposta de Valor</div>
        <div style="font-size:15px;color:#1a1a1a;font-weight:600;line-height:1.6">"Maranhão completo: São Luís, Raposa, Barreirinhas, Atins e Santo Amaro — do conteúdo ao fechamento, sem perrengue."</div>
        <div style="margin-top:14px;display:flex;gap:20px;flex-wrap:wrap;justify-content:center">
          <div style="text-align:center">
            <div style="font-size:20px;font-weight:900;color:${RED}">+300k</div>
            <div style="font-size:10px;color:#888">seguidores</div>
          </div>
          <div style="width:1px;background:#ddd"></div>
          <div style="text-align:center">
            <div style="font-size:20px;font-weight:900;color:${TEAL}">3</div>
            <div style="font-size:10px;color:#888">destinos Lençóis</div>
          </div>
          <div style="width:1px;background:#ddd"></div>
          <div style="text-align:center">
            <div style="font-size:20px;font-weight:900;color:${GOLD}">R$3–5</div>
            <div style="font-size:10px;color:#888">custo/conversa</div>
          </div>
          <div style="width:1px;background:#ddd"></div>
          <div style="text-align:center">
            <div style="font-size:20px;font-weight:900;color:${RED}">5%</div>
            <div style="font-size:10px;color:#888">tx. fechamento</div>
          </div>
        </div>
      </div>

    </div>`
  },
  // 2 QUEM SOMOS
  {tag:'CONTEXTO',title:'Quem Somos',html:`
    <div class="section-label">As duas partes da parceria</div>
    <div class="row">
      <div class="role-card">
        <div class="card-head"><div class="card-icon">📱</div><span>Role SLZ</span></div>
        <ul class="bullets">
          <li>+300k seguidores — maior autoridade de roteiros do Maranhão</li>
          <li>Audiência engajada: moradores, turistas e viajantes</li>
          <li>Opera: City Tour, Raposa, São João + Val Paraíso (a confirmar)</li>
          <li>Rede de parceiros locais com cupom ROLE SLZ</li>
          <li>Concierge integrado nos roteiros do cliente</li>
          <li>Produção de conteúdo estilo 'Sampa Dicas'</li>
          <li>Assessoria de tráfego pago para a Explore Atins</li>
        </ul>
      </div>
      <div class="explore-card">
        <div class="card-head"><div class="card-icon">🏜️</div><span>Explore Atins</span></div>
        <ul class="bullets">
          <li>Operadora especializada em Lençóis Maranhenses</li>
          <li>Foco: passeios e experiências — principal receita</li>
          <li>Pacotes Barreirinhas 3D e Atins 4D</li>
          <li>Bate-voltas: Barreirinhas / Atins / Santo Amaro</li>
          <li>Operação consolidada 7 dias na semana</li>
          <li>Acesso a restaurantes parceiros nos destinos</li>
        </ul>
      </div>
    </div>
    <div class="info-box teal"><strong style="color:${TEAL}">Sinergia:</strong> Audiência massiva (Role) + operação premium nos Lençóis (Explore) + conteúdo de autoridade = produto completo que nenhum dos dois entrega sozinho.</div>`
  },
  // 3 TESE
  {tag:'ESTRATÉGIA',title:'Tese de Crescimento',html:`
    <div class="section-label">Motor de volume + upsell + conteúdo</div>
    <div class="row" style="margin-bottom:14px">
      <div class="funnel-step" style="border:2px solid ${TEAL};box-shadow:0 2px 8px rgba(14,140,140,.15)">
        <div style="font-size:24px;margin-bottom:4px">🚌</div>
        <div style="font-weight:800;color:${TEAL};margin-bottom:4px;font-size:13px">Bate-Volta</div>
        <div style="font-size:12px">Motor de volume e captação. Baixo custo, alta recorrência. <strong>Porta de entrada</strong> para pacotes maiores.</div>
      </div>
      <div class="arrow-sep">➡️</div>
      <div class="funnel-step" style="border:2px solid ${RED};box-shadow:0 2px 8px rgba(192,57,43,.15)">
        <div style="font-size:24px;margin-bottom:4px">📦</div>
        <div style="font-weight:800;color:${RED};margin-bottom:4px;font-size:13px">Upsell Pacotes</div>
        <div style="font-size:12px">Quem faz o bate-volta <strong>quer voltar</strong>. Oferta natural: 3D Barreirinhas ou 4D Atins.</div>
      </div>
      <div class="arrow-sep">➡️</div>
      <div class="funnel-step" style="border:2px solid ${GOLD};box-shadow:0 2px 8px rgba(201,144,42,.15)">
        <div style="font-size:24px;margin-bottom:4px">🎬</div>
        <div style="font-weight:800;color:${GOLD};margin-bottom:4px;font-size:13px">Conteúdo Collab</div>
        <div style="font-size:12px">Viagem conjunta em <strong>abril/maio</strong>. Prévias já com materiais existentes da Explore.</div>
      </div>
    </div>
    <table><tr><th>Produto</th><th>Função no Funil</th><th>Volume Esperado</th></tr>
    <tr><td>Bate-volta (3 destinos)</td><td>Captação + prova social</td><td>Alto — motor de volume</td></tr>
    <tr><td>Pacote 3D Barreirinhas</td><td>Conversão mid</td><td>Médio</td></tr>
    <tr><td>Pacote 4D Atins</td><td>Conversão premium</td><td>Médio</td></tr>
    <tr><td>São João + Hotel</td><td>Pico sazonal (junho)</td><td>Alto sazonal</td></tr>
    <tr><td>Restaurantes/Experiências Parceiras</td><td>Concierge + cupom ROLE SLZ</td><td>Recorrente</td></tr></table>`
  },
  // 4 MODELO DE NEGÓCIO
  {tag:'COMERCIAL',title:'Modelo de Negócio',html:`
    <div class="section-label">Cada parte opera o que é seu — comissão sobre valor net</div>
    <div class="row">
      <div class="role-card">
        <div class="card-head"><div class="card-icon">📍</div><span>Role SLZ Entrega</span></div>
        <ul class="bullets">
          <li>City Tour, Raposa, Val Paraíso (a confirmar), São João</li>
          <li>Assessoria de tráfego pago para Explore</li>
          <li>Produção de conteúdo Collab</li>
          <li>Concierge com cupom ROLE SLZ nos roteiros</li>
          <li>Indicação de restaurantes e experiências em SLZ</li>
        </ul>
      </div>
      <div class="explore-card">
        <div class="card-head"><div class="card-icon">🏜️</div><span>Explore Atins Entrega</span></div>
        <ul class="bullets">
          <li>Bate-voltas (Barreirinhas / Atins / Santo Amaro)</li>
          <li>Pacote 3D Barreirinhas e 4D Atins</li>
          <li>Acesso a parceiros locais nos destinos</li>
          <li>Foco em passeios — principal receita</li>
        </ul>
      </div>
    </div>
    <div class="info-box teal">
      <strong style="color:${TEAL}">Modelo de comissão:</strong>
      <ul class="bullets" style="margin-top:6px">
        <li>Role SLZ recebe sobre o valor NET dos passeios da Explore</li>
        <li>Cross-sell: Explore indica SLZ/Raposa/São João → Explore recebe comissão sobre valor net de Role</li>
        <li>Parceiros (restaurantes, experiências): cupom ROLE SLZ rastreia → comissão combinada</li>
        <li>Status para comissão: "Confirmado" somente após pagamento efetuado</li>
      </ul>
    </div>
    <table style="margin-top:10px"><tr><th>Rastreio</th><th>Como funciona</th></tr>
    <tr><td>Cupom ROLE SLZ</td><td>Usado em restaurantes e experiências parceiras — rastreia indicações</td></tr>
    <tr><td>Tag no WhatsApp/CRM</td><td>Lead tagueado com origem no primeiro contato</td></tr>
    <tr><td>Planilha de status</td><td>Atualizada semanalmente: origem, produto, status, valor net, comissão</td></tr></table>`
  },
  // 5 CONTEÚDO COLLAB
  {tag:'CONTEÚDO',title:'Estratégia de Conteúdo — Estilo Sampa Dicas',html:`
    <div class="section-label red">Role SLZ produz. Explore abre os destinos.</div>
    <div style="background:#fff;border:2px solid ${RED};border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(192,57,43,.12)">
      <div style="font-weight:800;color:${RED};margin-bottom:8px">🎬 Viagem de Produção — Abril/Maio</div>
      <ul class="bullets">
        <li>Role SLZ vai a campo com a Explore nos 3 destinos (Atins, Barreirinhas, Santo Amaro)</li>
        <li>Produção de Reels Collab, carrosséis e stories com cara de conteúdo real</li>
        <li>Formato: roteiros práticos, preços, dicas, "o que fazer em X horas", restaurantes</li>
        <li>Captação de restaurantes e estabelecimentos locais para o concierge com cupom ROLE SLZ</li>
        <li>Enquanto a viagem não acontece: prévias com materiais existentes da Explore</li>
      </ul>
    </div>
    <div class="row">
      <div style="flex:1;min-width:160px;background:#fff;border:2px solid ${TEAL};border-radius:10px;padding:12px">
        <div style="font-weight:700;color:${TEAL};margin-bottom:6px">🍽️ Captação de Parceiros Locais</div>
        <ul class="bullets">
          <li>Restaurantes em Atins, Barreirinhas e Santo Amaro</li>
          <li>Experiências locais (artesanato, culinária, passeios extras)</li>
          <li>Entram no roteiro do cliente via concierge</li>
          <li>Cupom ROLE SLZ rastreia e gera comissão</li>
        </ul>
      </div>
      <div style="flex:1;min-width:160px;background:#fff;border:2px solid ${GOLD};border-radius:10px;padding:12px">
        <div style="font-weight:700;color:${GOLD};margin-bottom:6px">📱 Estilo de Conteúdo</div>
        <ul class="bullets">
          <li>Real e prático — como Sampa Dicas faz em São Paulo</li>
          <li>Sem cara de anúncio: roteiro real, opinião real</li>
          <li>Role SLZ + Explore no mesmo vídeo</li>
          <li>Objetivo: entregar o roteiro completo pronto ao seguidor</li>
        </ul>
      </div>
    </div>`
  },
  // 6 CONCIERGE
  {tag:'CONCIERGE',title:'Concierge + Rede de Parceiros',html:`
    <div class="section-label teal">Inserir estabelecimentos no roteiro do cliente — cupom rastreável</div>
    <div class="info-box teal" style="margin-bottom:14px">
      <strong style="color:${TEAL}">Como funciona:</strong> Ao fechar um passeio ou pacote, o cliente recebe um <strong>roteiro personalizado</strong> com indicações de restaurantes e estabelecimentos parceiros — cada um com cupom exclusivo <span class="tag-badge">ROLE SLZ</span>
    </div>
    <table><tr><th>Destino</th><th>Tipo de Parceiro</th><th>Modelo</th><th>Rastreio</th></tr>

let cur=0;
const total=slides.length;

function render(){
  const s=slides[cur];
  document.getElementById('slide-counter').textContent=`Slide ${cur+1} de ${total}`;
  document.getElementById('slide-tag').textContent=s.tag;
  document.getElementById('slide-title').textContent=s.title;
  document.getElementById('slide-body').innerHTML=s.html;
  document.getElementById('prev-btn').disabled=cur===0;
  document.getElementById('next-btn').disabled=cur===total-1;
  // dots
  const dc=document.getElementById('dots');
  dc.innerHTML='';
  slides.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot';
    d.style.width=i===cur?'20px':'8px';
    d.style.background=i===cur?(cur<18?RED:TEAL):'rgba(255,255,255,.3)';
    d.onclick=()=>go(i-cur);
    dc.appendChild(d);
  });
  // index
  const ic=document.getElementById('index');
  ic.innerHTML='';
  slides.forEach((sl,i)=>{
    const b=document.createElement('button');
    b.className='idx-btn'+(i===cur?' active':'');
    if(i===cur) b.style.background=cur<18?RED:TEAL, b.style.borderColor=cur<18?RED:TEAL;
    b.textContent=`${i+1}. ${sl.tag}`;
    b.onclick=()=>{cur=i;render();};
    ic.appendChild(b);
  });
}

function go(d){
  cur=Math.max(0,Math.min(total-1,cur+d));
  render();
}

// Teclado
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});

render();
</script>
